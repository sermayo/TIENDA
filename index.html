<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Marketplace - Demo Funcional</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --color-bg: #f8fafc;
            --color-card: #ffffff;
            --color-primary: #1e293b;
            --color-accent: #3b82f6;
            --color-text: #334155;
            --color-border: #e2e8f0;
        }
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--color-bg); 
            color: var(--color-text);
        }
        .sidebar { width: 240px; background: white; height: 100vh; position: fixed; border-right: 1px solid var(--color-border); padding: 20px; box-sizing: border-box; }
        .content { margin-left: 240px; padding: 40px; min-height: 100vh; }
        .nav-btn { width: 100%; text-align: left; padding: 12px; margin-bottom: 8px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .nav-btn:hover { background: #f1f5f9; }
        .nav-btn.active { background: #1e293b; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }
        .card { background: white; border: 1px solid var(--color-border); border-radius: 16px; overflow: hidden; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card-img { height: 180px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; fontSize: 60px; }
        .card-body { padding: 16px; }
        .btn-buy { width: 100%; padding: 10px; background: #111; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .btn-buy:disabled { background: #cbd5e1; cursor: not-allowed; }
        .badge { background: #fee2e2; color: #991b1b; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .order-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--color-border); margin-bottom: 15px; }
        .cart-item { display: flex; gap: 15px; align-items: center; background: white; padding: 15px; border-radius: 12px; border: 1px solid var(--color-border); margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const INITIAL_PRODUCTS = [
            { id: 1, name: "iPhone 15 Pro Max", price: 1299, image: "📱", stock: 5, category: "Electrónica" },
            { id: 2, name: "MacBook Air M3", price: 1099, image: "💻", stock: 3, category: "Computadoras" },
            { id: 3, name: "Sony WH-1000XM5", price: 279, image: "🎧", stock: 10, category: "Audio" },
            { id: 4, name: "Apple Watch Ultra", price: 799, image: "⌚", stock: 7, category: "Wearables" }
        ];

        function App() {
            const [view, setView] = useState('home');
            const [products, setProducts] = useState(INITIAL_PRODUCTS);
            const [cart, setCart] = useState([]);
            const [orders, setOrders] = useState([
                { id: "#ORD-1234", product: "Ejemplo: Teclado Mecánico", date: "01 May 2026", amount: 150, status: "Entregado" }
            ]);

            const addToCart = (p) => {
                setCart(prev => {
                    const exists = prev.find(item => item.id === p.id);
                    if (exists) return prev.map(item => item.id === p.id ? {...item, qty: item.qty + 1} : item);
                    return [...prev, {...p, qty: 1}];
                });
                alert(`${p.name} añadido al carrito`);
            };

            const placeOrder = () => {
                const total = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
                const newOrder = {
                    id: `#ORD-${Math.floor(Math.random() * 9000) + 1000}`,
                    product: cart.map(i => `${i.name} (x${i.qty})`).join(", "),
                    date: new Date().toLocaleDateString(),
                    amount: total,
                    status: "En preparación"
                };

                // Actualizar stock
                setProducts(products.map(p => {
                    const inCart = cart.find(c => c.id === p.id);
                    return inCart ? {...p, stock: p.stock - inCart.qty} : p;
                }));

                setOrders([newOrder, ...orders]);
                setCart([]);
                setView('orders');
            };

            return (
                <div>
                    <div className="sidebar">
                        <h2>◆ Nexo</h2>
                        <button className={`nav-btn ${view === 'home' ? 'active' : ''}`} onClick={() => setView('home')}>🏪 Tienda</button>
                        <button className={`nav-btn ${view === 'cart' ? 'active' : ''}`} onClick={() => setView('cart')}>🛒 Carrito ({cart.length})</button>
                        <button className={`nav-btn ${view === 'orders' ? 'active' : ''}`} onClick={() => setView('orders')}>📋 Mis Pedidos ({orders.length})</button>
                    </div>

                    <div className="content">
                        {view === 'home' && (
                            <div>
                                <h1>Explora Productos</h1>
                                <div className="grid">
                                    {products.map(p => (
                                        <div key={p.id} className="card">
                                            <div className="card-img">{p.image}</div>
                                            <div className="card-body">
                                                <div style={{display:'flex', justifyContent:'space-between'}}>
                                                    <span style={{fontSize:12, color:'#64748b'}}>{p.category}</span>
                                                    {p.stock < 3 && <span className="badge">¡Últimas {p.stock}!</span>}
                                                </div>
                                                <h3 style={{margin:'8px 0'}}>{p.name}</h3>
                                                <div style={{fontSize:20, fontWeight:'bold'}}>${p.price}</div>
                                                <button 
                                                    className="btn-buy" 
                                                    disabled={p.stock === 0}
                                                    onClick={() => addToCart(p)}
                                                >
                                                    {p.stock > 0 ? "Añadir al Carrito" : "Agotado"}
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'cart' && (
                            <div>
                                <h1>Tu Carrito</h1>
                                {cart.length === 0 ? <p>No hay productos aquí.</p> : (
                                    <div style={{maxWidth: 600}}>
                                        {cart.map(item => (
                                            <div key={item.id} className="cart-item">
                                                <div style={{fontSize:30}}>{item.image}</div>
                                                <div style={{flex:1}}>
                                                    <strong>{item.name}</strong>
                                                    <div>Cant: {item.qty}</div>
                                                </div>
                                                <div style={{fontWeight:'bold'}}>${item.price * item.qty}</div>
                                            </div>
                                        ))}
                                        <div style={{textAlign:'right', marginTop: 20}}>
                                            <h3>Total: ${cart.reduce((s, i) => s + (i.price * i.qty), 0)}</h3>
                                            <button className="btn-buy" onClick={placeOrder} style={{width:'auto', padding:'12px 30px'}}>
                                                Confirmar Pedido
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'orders' && (
                            <div>
                                <h1>Mis Pedidos Realizados</h1>
                                {orders.map(o => (
                                    <div key={o.id} className="order-card">
                                        <div style={{display:'flex', justifyContent:'space-between'}}>
                                            <strong>ID: {o.id}</strong>
                                            <span style={{color: '#3b82f6', fontWeight:'bold'}}>{o.status}</span>
                                        </div>
                                        <div style={{color: '#64748b', fontSize: 13}}>{o.date}</div>
                                        <p>Productos: {o.product}</p>
                                        <div style={{textAlign:'right', fontWeight:'bold', fontSize:18}}>${o.amount}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
