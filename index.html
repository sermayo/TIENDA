<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Marketplace - Funcional</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --color-background-primary: #ffffff;
            --color-background-secondary: #f8fafc;
            --color-text-primary: #0f172a;
            --color-text-secondary: #64748b;
            --color-border-tertiary: #e2e8f0;
        }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; color: var(--color-text-primary); }
        button { cursor: pointer; border: none; transition: all 0.2s; }
        .sidebar-btn { width: 100%; display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; background: transparent; font-size: 14px; color: var(--color-text-secondary); text-align: left; }
        .sidebar-btn.active { background: #e2e8f0; color: var(--color-text-primary); font-weight: 600; }
        .product-card { background: white; border: 1px solid var(--color-border-tertiary); border-radius: 16px; overflow: hidden; }
        .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: #f1f5f9; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const INITIAL_PRODUCTS = [
            { id: 1, name: "iPhone 15 Pro Max", price: 1299, image: "📱", category: "Electrónica", stock: 15, description: "Titanio premium y chip A17 Pro." },
            { id: 2, name: "MacBook Air M3", price: 1099, image: "💻", category: "Computadoras", stock: 8, description: "Potencia y elegancia portátil." },
            { id: 3, name: "Sony WH-1000XM5", price: 279, image: "🎧", category: "Audio", stock: 42, description: "Cancelación de ruido líder." },
            { id: 4, name: "Samsung OLED 65\"", price: 1799, image: "📺", category: "Electrónica", stock: 5, description: "Colores perfectos." }
        ];

        function App() {
            const [view, setView] = useState('home');
            const [products, setProducts] = useState(INITIAL_PRODUCTS);
            const [cart, setCart] = useState([]);
            const [orders, setOrders] = useState([
                { id: "#ORD-8821", product: "iPhone 15 Pro Max", date: "10 May 2026", status: "Entregado", amount: 1299 }
            ]);
            const [selectedProduct, setSelectedProduct] = useState(null);

            const addToCart = (product) => {
                if (product.stock <= 0) return;
                setCart(prev => {
                    const exists = prev.find(i => i.id === product.id);
                    if (exists) return prev.map(i => i.id === product.id ? {...i, qty: i.qty + 1} : i);
                    return [...prev, {...product, qty: 1}];
                });
            };

            const handleCheckout = () => {
                if (cart.length === 0) return;
                const newOrder = {
                    id: `#ORD-${Math.floor(1000 + Math.random() * 9000)}`,
                    product: cart.map(i => `${i.name} (x${i.qty})`).join(", "),
                    date: new Date().toLocaleDateString(),
                    status: "En preparación",
                    amount: cart.reduce((acc, item) => acc + (item.price * item.qty), 0)
                };
                setOrders([newOrder, ...orders]);
                setProducts(products.map(p => {
                    const itemInCart = cart.find(c => c.id === p.id);
                    return itemInCart ? {...p, stock: p.stock - itemInCart.qty} : p;
                }));
                setCart([]);
                setView('orders');
                alert("¡Pedido realizado con éxito!");
            };

            return (
                <div style={{ display: 'flex', height: '100vh' }}>
                    {/* SIDEBAR */}
                    <aside style={{ width: 240, background: 'white', borderRight: '1px solid var(--color-border-tertiary)', padding: 20 }}>
                        <h2 style={{ fontSize: 22, fontWeight: 800, marginBottom: 30 }}>◆ Nexo</h2>
                        <nav style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                            <button className={`sidebar-btn ${view === 'home' ? 'active' : ''}`} onClick={() => setView('home')}>🏪 Inicio</button>
                            <button className={`sidebar-btn ${view === 'cart' ? 'active' : ''}`} onClick={() => setView('cart')}>🛒 Carrito ({cart.length})</button>
                            <button className={`sidebar-btn ${view === 'orders' ? 'active' : ''}`} onClick={() => setView('orders')}>📋 Pedidos</button>
                        </nav>
                    </aside>

                    {/* CONTENIDO PRINCIPAL */}
                    <main style={{ flex: 1, overflowY: 'auto', padding: 30 }}>
                        {view === 'home' && (
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: 20 }}>
                                {products.map(p => (
                                    <div key={p.id} className="product-card" onClick={() => setSelectedProduct(p)}>
                                        <div style={{ height: 150, background: '#f8fafc', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 50 }}>{p.image}</div>
                                        <div style={{ padding: 15 }}>
                                            <h4 style={{ margin: '0 0 10px' }}>{p.name}</h4>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                <span style={{ fontWeight: 700 }}>${p.price}</span>
                                                <button onClick={(e) => { e.stopPropagation(); addToCart(p); }} style={{ background: '#111', color: 'white', padding: '5px 10px', borderRadius: 6 }}>+</button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'cart' && (
                            <div style={{ maxWidth: 600, background: 'white', padding: 25, borderRadius: 16 }}>
                                <h3>Tu Carrito</h3>
                                {cart.length === 0 ? <p>El carrito está vacío.</p> : (
                                    <>
                                        {cart.map(item => (
                                            <div key={item.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: '1px solid #eee' }}>
                                                <span>{item.name} (x{item.qty})</span>
                                                <strong>${item.price * item.qty}</strong>
                                            </div>
                                        ))}
                                        <div style={{ marginTop: 20, textAlign: 'right' }}>
                                            <h4>Total: ${cart.reduce((acc, item) => acc + (item.price * item.qty), 0)}</h4>
                                            <button onClick={handleCheckout} style={{ background: '#111', color: 'white', padding: '10px 20px', borderRadius: 8 }}>Finalizar Compra</button>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {view === 'orders' && (
                            <div style={{ maxWidth: 600 }}>
                                <h3>Mis Pedidos</h3>
                                {orders.map(o => (
                                    <div key={o.id} style={{ background: 'white', padding: 15, borderRadius: 12, marginBottom: 10, border: '1px solid #eee' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                            <strong>{o.id}</strong>
                                            <span style={{ color: 'blue' }}>{o.status}</span>
                                        </div>
                                        <p style={{ fontSize: 13, color: '#666' }}>{o.product}</p>
                                        <div style={{ textAlign: 'right', fontWeight: 700 }}>${o.amount}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* MODAL DETALLE */}
                    {selectedProduct && (
                        <div className="modal-overlay" onClick={() => setSelectedProduct(null)}>
                            <div style={{ background: 'white', padding: 30, borderRadius: 20, maxWidth: 400, textAlign: 'center' }} onClick={e => e.stopPropagation()}>
                                <div style={{ fontSize: 80 }}>{selectedProduct.image}</div>
                                <h2>{selectedProduct.name}</h2>
                                <p>{selectedProduct.description}</p>
                                <p>Stock disponible: {selectedProduct.stock}</p>
                                <button onClick={() => { addToCart(selectedProduct); setSelectedProduct(null); }} style={{ background: '#111', color: 'white', padding: '10px 20px', borderRadius: 8, width: '100%' }}>Añadir al carrito</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
