<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo OS | Marketplace & Finanzas</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg: #f4f7f6;
            --sidebar: #ffffff;
            --accent: #000000;
            --text-main: #1a1a1a;
            --text-muted: #71717a;
            --border: #e4e4e7;
            --success: #22c55e;
        }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text-main); overflow: hidden; }
        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .layout { display: flex; height: 100vh; }
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 32px 20px; display: flex; flex-direction: column; }
        .main { flex: 1; overflow-y: auto; padding: 40px; position: relative; }
        
        .nav-btn { 
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: none; 
            background: transparent; width: 100%; border-radius: 12px; cursor: pointer;
            font-size: 14px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px;
        }
        .nav-btn.active { background: #f4f4f5; color: var(--accent); font-weight: 700; }
        .nav-btn:hover:not(.active) { background: #fafafa; color: var(--accent); }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }
        .p-card { background: white; border-radius: 24px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        .p-card:hover { transform: translateY(-8px); box-shadow: 0 20px 30px -10px rgba(0,0,0,0.1); }
        .p-img { height: 200px; background: #f8f8f8; display: flex; align-items: center; justify-content: center; font-size: 70px; }
        
        /* Sistema de Pago */
        .payment-card { background: #18181b; color: white; padding: 24px; border-radius: 20px; margin-bottom: 24px; position: relative; overflow: hidden; }
        .payment-card::after { content: ""; position: absolute; top: -50%; right: -20%; width: 200px; height: 200px; background: rgba(255,255,255,0.05); border-radius: 50%; }
        
        input, select { padding: 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 14px; width: 100%; margin-top: 6px; }
        .btn-pay { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }

        .badge-status { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CATALOGO = [
            { id: 1, name: "iPhone 15 Pro", price: 1200, category: "Móviles", img: "📱", stock: 12, desc: "Cámara Pro y Titanio." },
            { id: 2, name: "iPad Pro M4", price: 950, category: "Tablets", img: "平板", stock: 8, desc: "Pantalla OLED ultra delgada." },
            { id: 3, name: "DJI Mavic 3", price: 2100, category: "Drones", img: "🛸", stock: 5, desc: "Cámara Hasselblad 4/3." },
            { id: 4, name: "Sony A7 IV", price: 2500, category: "Cámaras", img: "📷", stock: 4, desc: "La cámara híbrida definitiva." },
            { id: 5, name: "PS5 Slim", price: 500, category: "Gaming", img: "🎮", stock: 20, desc: "825GB de pura velocidad." },
            { id: 6, name: "AirPods Max", price: 550, category: "Audio", img: "🎧", stock: 15, desc: "Audio espacial inmersivo." },
            { id: 7, name: "Mac Studio", price: 1999, category: "Computadoras", img: "🖥️", stock: 3, desc: "Potencia para profesionales." },
            { id: 8, name: "Tesla Wallbox", price: 650, category: "Domótica", img: "🔋", stock: 10, desc: "Carga rápida en casa." },
            { id: 9, name: "Nintendo Switch", price: 300, category: "Gaming", img: "🕹️", stock: 25, desc: "Juega donde quieras." },
            { id: 10, name: "Smart Lock G3", price: 220, category: "Domótica", img: "🔐", stock: 40, desc: "Seguridad biométrica." }
        ];

        function App() {
            const [view, setView] = useState('shop');
            const [cart, setCart] = useState([]);
            const [orders, setOrders] = useState([]);
            const [isPaying, setIsPaying] = useState(false);
            const [paymentStep, setPaymentStep] = useState(1); // 1: Cart, 2: Checkout, 3: Success

            // Lógica de Carrito
            const addToCart = (p) => {
                const exist = cart.find(x => x.id === p.id);
                if (exist) {
                    setCart(cart.map(x => x.id === p.id ? {...x, qty: x.qty + 1} : x));
                } else {
                    setCart([...cart, {...p, qty: 1}]);
                }
            };

            const subtotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            const shipping = subtotal > 1000 ? 0 : 25;
            const total = subtotal + shipping;

            // Simulación de Pago
            const processPayment = (e) => {
                e.preventDefault();
                setIsPaying(true);
                setTimeout(() => {
                    const newOrder = {
                        id: `#NX${Math.floor(Math.random()*90000)}`,
                        date: new Date().toLocaleDateString(),
                        amount: total,
                        items: cart.length,
                        status: 'Pagado'
                    };
                    setOrders([newOrder, ...orders]);
                    setIsPaying(false);
                    setPaymentStep(3);
                    setCart([]);
                }, 2500);
            };

            return (
                <div className="layout">
                    {/* SIDEBAR */}
                    <aside className="sidebar">
                        <div style={{fontSize: 24, fontWeight: 900, marginBottom: 40}}>NEXO OS</div>
                        
                        <nav style={{flex: 1}}>
                            <button className={`nav-btn ${view === 'shop' ? 'active' : ''}`} onClick={() => {setView('shop'); setPaymentStep(1)}}>🏪 Tienda</button>
                            <button className={`nav-btn ${view === 'cart' ? 'active' : ''}`} onClick={() => setView('cart')}>🛒 Mi Carrito ({cart.length})</button>
                            <button className={`nav-btn ${view === 'orders' ? 'active' : ''}`} onClick={() => setView('orders')}>📋 Pedidos ({orders.length})</button>
                        </nav>

                        <div style={{background: '#000', color: '#fff', padding: 20, borderRadius: 16}}>
                            <div style={{fontSize: 12, opacity: 0.6}}>Saldo Nexo Card</div>
                            <div style={{fontSize: 20, fontWeight: 700}}>$12,450.00</div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="main">
                        
                        {view === 'shop' && (
                            <>
                                <h1 style={{fontSize: 32, marginBottom: 8}}>Catálogo Premium</h1>
                                <p style={{color: 'var(--text-muted)', marginBottom: 40}}>Productos verificados con garantía global.</p>
                                
                                <div className="product-grid">
                                    {CATALOGO.map(p => (
                                        <div key={p.id} className="p-card">
                                            <div className="p-img">{p.img}</div>
                                            <div style={{padding: 20}}>
                                                <div style={{fontSize: 12, color: 'blue', fontWeight: 700}}>{p.category}</div>
                                                <h3 style={{margin: '4px 0'}}>{p.name}</h3>
                                                <p style={{fontSize: 13, color: '#666', height: 40}}>{p.desc}</p>
                                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 15}}>
                                                    <span style={{fontSize: 20, fontWeight: 900}}>${p.price}</span>
                                                    <button onClick={() => addToCart(p)} style={{background: '#000', color: '#fff', border: 'none', padding: '8px 14px', borderRadius: 10, cursor: 'pointer'}}> Añadir</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </>
                        )}

                        {view === 'cart' && (
                            <div style={{maxWidth: 900, margin: '0 auto'}}>
                                {paymentStep === 1 && (
                                    <>
                                        <h1>Tu Carrito</h1>
                                        {cart.length === 0 ? <p>No tienes productos seleccionados.</p> : (
                                            <div style={{display: 'flex', gap: 40}}>
                                                <div style={{flex: 1}}>
                                                    {cart.map(item => (
                                                        <div key={item.id} style={{display: 'flex', gap: 20, background: '#fff', padding: 20, borderRadius: 20, marginBottom: 12, alignItems: 'center', border: '1px solid var(--border)'}}>
                                                            <div style={{fontSize: 40}}>{item.img}</div>
                                                            <div style={{flex: 1}}>
                                                                <div style={{fontWeight: 700}}>{item.name}</div>
                                                                <div style={{color: '#666'}}>Cantidad: {item.qty}</div>
                                                            </div>
                                                            <div style={{fontWeight: 800}}>${item.price * item.qty}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                                <div style={{width: 300, background: '#fff', padding: 24, borderRadius: 24, border: '1px solid var(--border)', height: 'fit-content'}}>
                                                    <h3>Resumen</h3>
                                                    <div style={{display: 'flex', justifyContent: 'space-between', margin: '12px 0'}}><span>Subtotal</span><span>${subtotal}</span></div>
                                                    <div style={{display: 'flex', justifyContent: 'space-between', margin: '12px 0'}}><span>Envío</span><span>{shipping === 0 ? 'Gratis' : `$${shipping}`}</span></div>
                                                    <hr style={{border: 'none', borderTop: '1px solid #eee', margin: '20px 0'}}/>
                                                    <div style={{display: 'flex', justifyContent: 'space-between', fontSize: 20, fontWeight: 900}}><span>Total</span><span>${total}</span></div>
                                                    <button onClick={() => setPaymentStep(2)} className="btn-pay">Continuar al Pago</button>
                                                </div>
                                            </div>
                                        )}
                                    </>
                                )}

                                {paymentStep === 2 && (
                                    <div style={{maxWidth: 500, margin: '0 auto'}}>
                                        <button onClick={() => setPaymentStep(1)} style={{background: 'none', border: 'none', cursor: 'pointer', marginBottom: 20}}>← Volver</button>
                                        <h1>Checkout</h1>
                                        
                                        <div className="payment-card">
                                            <div style={{fontSize: 12, opacity: 0.8, marginBottom: 20}}>MÉTODO DE PAGO</div>
                                            <div style={{fontSize: 18, letterSpacing: 2, marginBottom: 20}}>**** **** **** 8821</div>
                                            <div style={{display: 'flex', justifyContent: 'space-between'}}>
                                                <div><small style={{opacity: 0.6}}>Titular</small><br/>JUAN PEREZ</div>
                                                <div><small style={{opacity: 0.6}}>Expira</small><br/>12/28</div>
                                            </div>
                                        </div>

                                        <form onSubmit={processPayment}>
                                            <div style={{marginBottom: 16}}>
                                                <label>Número de Tarjeta</label>
                                                <input type="text" placeholder="4512 8821 9901 2341" required />
                                            </div>
                                            <div style={{display: 'flex', gap: 16, marginBottom: 16}}>
                                                <div style={{flex: 1}}><label>Vencimiento</label><input type="text" placeholder="MM/AA" required /></div>
                                                <div style={{flex: 1}}><label>CVV</label><input type="password" placeholder="***" required /></div>
                                            </div>
                                            <div style={{marginBottom: 16}}>
                                                <label>Cuotas</label>
                                                <select>
                                                    <option>1 cuota de ${total}</option>
                                                    <option>3 cuotas de ${(total/3).toFixed(2)} (Sin interés)</option>
                                                    <option>6 cuotas de ${(total/6).toFixed(2)}</option>
                                                </select>
                                            </div>
                                            <button type="submit" disabled={isPaying} className="btn-pay">
                                                {isPaying ? <span className="loader"></span> : `Pagar $${total}`}
                                            </button>
                                        </form>
                                    </div>
                                )}

                                {paymentStep === 3 && (
                                    <div style={{textAlign: 'center', padding: 60}}>
                                        <div style={{fontSize: 80, marginBottom: 20}}>✅</div>
                                        <h1>¡Pago Exitoso!</h1>
                                        <p>Tu pedido ha sido procesado y enviado a la dirección de facturación.</p>
                                        <button onClick={() => {setView('orders'); setPaymentStep(1)}} style={{marginTop: 30, padding: '12px 24px', borderRadius: 10, border: '1px solid #000', cursor: 'pointer'}}>Ver mis pedidos</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'orders' && (
                            <div style={{maxWidth: 800}}>
                                <h1>Mis Pedidos</h1>
                                {orders.length === 0 ? <p>Aún no has realizado ninguna compra.</p> : (
                                    orders.map(order => (
                                        <div key={order.id} style={{background: '#fff', padding: 24, borderRadius: 20, border: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16}}>
                                            <div>
                                                <div style={{fontWeight: 800, fontSize: 18}}>{order.id}</div>
                                                <div style={{fontSize: 13, color: '#666'}}>{order.date} • {order.items} productos</div>
                                            </div>
                                            <div style={{textAlign: 'right'}}>
                                                <div style={{fontSize: 20, fontWeight: 900}}>${order.amount}</div>
                                                <span className="badge-status" style={{background: '#dcfce7', color: '#166534'}}>Confirmado</span>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
